# Enforces Conventional Commits format for pull request titles.
name: pr title lint

permissions:
  pull-requests: read

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  lint-pr-title:
    name: validate title format
    runs-on: ubuntu-latest
    steps:
      - name: "Reject empty scope"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" =~ ^[a-z]+\(\)[!]?: ]]; then
            echo "::error::PR title has empty scope parentheses: '$PR_TITLE'"
            echo "Either remove the parentheses or provide a scope (e.g., 'fix(langgraph): ...')."
            exit 1
          fi

      - name: "Validate Conventional Commits format"
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            release
            hotfix
          scopes: |
            cds-langgraph-persistence
            docs
            examples
            internal
            infra
            deps
            deps-dev
          requireScope: false
          disallowScopes: |
            release
            [A-Z]+
          ignoreLabels: |
            ignore-lint-pr-title
